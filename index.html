<!-- Service Worker: permite funcionar offline -->
<script>
if ('serviceWorker' in navigator) {
  const swCode = `
    const CACHE = 'meuplano-v1';
    self.addEventListener('install', e => {
      self.skipWaiting();
    });
    self.addEventListener('fetch', e => {
      e.respondWith(
        fetch(e.request).catch(() => caches.match(e.request))
      );
    });
  `;
  const blob = new Blob([swCode], {type: 'application/javascript'});
  const swUrl = URL.createObjectURL(blob);
  navigator.serviceWorker.register(swUrl).catch(() => {});
}
</script>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f2ee;
    --surface: #ffffff;
    --text: #2a2520;
    --text-soft: #6b6259;
    --border: #e8e2da;

    --fin-bg: #e8f4f0;
    --fin-accent: #2d8c6e;
    --fin-light: #b8e0d4;

    --work-bg: #e8eef8;
    --work-accent: #3a5fa8;
    --work-light: #b8c9e8;

    --home-bg: #fdf0e8;
    --home-accent: #c4622d;
    --home-light: #f5cdb0;

    --pend-bg: #f8f0e8;
    --pend-accent: #a0782a;
    --pend-light: #edd9a8;

    --dream-bg: #f0ebf8;
    --dream-accent: #7a4fa8;
    --dream-light: #d4b8f0;

    --shadow-soft: 0 2px 16px rgba(0,0,0,0.07);
    --shadow-hover: 0 8px 32px rgba(0,0,0,0.13);
    --radius: 20px;
    --radius-sm: 12px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ── TOP BAR ── */
  .topbar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 14px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 1px 8px rgba(0,0,0,0.05);
  }
  .topbar-logo {
    font-family: 'Playfair Display', serif;
    font-size: 1.4rem;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -0.02em;
  }
  .topbar-logo span { color: var(--dream-accent); }
  .topbar-date-nav {
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--bg);
    border-radius: 50px;
    padding: 6px 16px;
  }
  .date-arrow {
    background: none;
    border: none;
    cursor: pointer;
    width: 30px;
    height: 30px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-soft);
    font-size: 1rem;
    transition: all 0.18s;
  }
  .date-arrow:hover {
    background: var(--surface);
    color: var(--text);
    box-shadow: var(--shadow-soft);
  }
  .date-label {
    font-size: 0.88rem;
    font-weight: 600;
    color: var(--text);
    min-width: 160px;
    text-align: center;
    letter-spacing: 0.01em;
  }
  .topbar-back {
    background: none;
    border: 1.5px solid var(--border);
    border-radius: 50px;
    padding: 6px 18px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.82rem;
    font-weight: 500;
    color: var(--text-soft);
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: all 0.18s;
  }
  .topbar-back:hover {
    border-color: var(--text-soft);
    color: var(--text);
    background: var(--surface);
  }
  .topbar-back.hidden { visibility: hidden; }

  /* ── MAIN CONTENT ── */
  .main { padding: 40px 32px; max-width: 1100px; margin: 0 auto; }

  /* ── HOME SCREEN ── */
  .home-title {
    font-family: 'Playfair Display', serif;
    font-size: 2rem;
    font-weight: 700;
    margin-bottom: 8px;
    color: var(--text);
  }
  .home-subtitle {
    font-size: 0.9rem;
    color: var(--text-soft);
    margin-bottom: 36px;
    font-weight: 400;
  }
  .menu-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 20px;
  }
  .menu-card {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 28px 24px;
    cursor: pointer;
    transition: all 0.22s cubic-bezier(.34,1.3,.64,1);
    box-shadow: var(--shadow-soft);
    border: 1.5px solid transparent;
    position: relative;
    overflow: hidden;
  }
  .menu-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 5px;
    border-radius: var(--radius) var(--radius) 0 0;
    transition: height 0.22s;
  }
  .menu-card:hover { transform: translateY(-5px); box-shadow: var(--shadow-hover); }
  .menu-card:hover::before { height: 8px; }

  .menu-card.fin::before { background: var(--fin-accent); }
  .menu-card.fin { border-color: var(--fin-light); }
  .menu-card.fin:hover { background: var(--fin-bg); border-color: var(--fin-accent); }

  .menu-card.work::before { background: var(--work-accent); }
  .menu-card.work { border-color: var(--work-light); }
  .menu-card.work:hover { background: var(--work-bg); border-color: var(--work-accent); }

  .menu-card.home::before { background: var(--home-accent); }
  .menu-card.home { border-color: var(--home-light); }
  .menu-card.home:hover { background: var(--home-bg); border-color: var(--home-accent); }

  .menu-card.pend::before { background: var(--pend-accent); }
  .menu-card.pend { border-color: var(--pend-light); }
  .menu-card.pend:hover { background: var(--pend-bg); border-color: var(--pend-accent); }

  .menu-card.dream::before { background: var(--dream-accent); }
  .menu-card.dream { border-color: var(--dream-light); }
  .menu-card.dream:hover { background: var(--dream-bg); border-color: var(--dream-accent); }

  .card-icon {
    font-size: 2rem;
    margin-bottom: 14px;
    display: block;
  }
  .card-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.15rem;
    font-weight: 600;
    margin-bottom: 6px;
  }
  .card-desc {
    font-size: 0.78rem;
    color: var(--text-soft);
    line-height: 1.5;
  }
  .card-badge {
    position: absolute;
    top: 18px;
    right: 18px;
    font-size: 0.7rem;
    font-weight: 600;
    padding: 3px 9px;
    border-radius: 50px;
    background: var(--bg);
    color: var(--text-soft);
  }
  .menu-card.fin .card-badge { background: var(--fin-light); color: var(--fin-accent); }
  .menu-card.work .card-badge { background: var(--work-light); color: var(--work-accent); }
  .menu-card.home .card-badge { background: var(--home-light); color: var(--home-accent); }
  .menu-card.pend .card-badge { background: var(--pend-light); color: var(--pend-accent); }
  .menu-card.dream .card-badge { background: var(--dream-light); color: var(--dream-accent); }

  /* ── AREA SCREEN ── */
  .area-header {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 32px;
  }
  .area-icon-big {
    font-size: 2.4rem;
    width: 60px;
    height: 60px;
    border-radius: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .area-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.8rem;
    font-weight: 700;
  }
  .area-subtitle { font-size: 0.85rem; color: var(--text-soft); margin-top: 2px; }

  /* Task add row */
  .add-row {
    display: flex;
    gap: 10px;
    margin-bottom: 24px;
  }
  .add-input {
    flex: 1;
    padding: 12px 18px;
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    background: var(--surface);
    color: var(--text);
    outline: none;
    transition: border-color 0.18s;
  }
  .add-input:focus { border-color: currentColor; }
  .add-btn {
    padding: 12px 22px;
    border: none;
    border-radius: var(--radius-sm);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.88rem;
    font-weight: 600;
    cursor: pointer;
    color: #fff;
    transition: all 0.18s;
    white-space: nowrap;
  }
  .add-btn:hover { opacity: 0.88; transform: translateY(-1px); }

  /* Task list */
  .task-list { display: flex; flex-direction: column; gap: 10px; }
  .task-item {
    background: var(--surface);
    border-radius: var(--radius-sm);
    padding: 14px 18px;
    display: flex;
    align-items: center;
    gap: 14px;
    box-shadow: var(--shadow-soft);
    border: 1.5px solid var(--border);
    transition: all 0.18s;
    animation: slideIn 0.25s ease;
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .task-item:hover { box-shadow: var(--shadow-hover); }
  .task-check {
    width: 22px;
    height: 22px;
    border-radius: 6px;
    border: 2px solid var(--border);
    cursor: pointer;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.18s;
    font-size: 0.75rem;
    color: #fff;
  }
  .task-check.done { color: #fff; border-color: transparent; }
  .task-text {
    flex: 1;
    font-size: 0.9rem;
    line-height: 1.4;
    transition: all 0.18s;
  }
  .task-text.done { text-decoration: line-through; color: var(--text-soft); opacity: 0.7; }
  .task-date-badge {
    font-size: 0.7rem;
    padding: 3px 9px;
    border-radius: 50px;
    background: var(--bg);
    color: var(--text-soft);
    white-space: nowrap;
  }
  .task-del {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--text-soft);
    font-size: 0.85rem;
    padding: 4px;
    border-radius: 6px;
    transition: all 0.15s;
    opacity: 0.5;
  }
  .task-del:hover { opacity: 1; background: #fee; color: #c0392b; }

  .empty-state {
    text-align: center;
    padding: 48px 24px;
    color: var(--text-soft);
    font-size: 0.9rem;
  }
  .empty-state .empty-icon { font-size: 2.5rem; margin-bottom: 12px; opacity: 0.5; }

  /* ── FINANCEIRO especial ── */
  .fin-summary {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    margin-bottom: 24px;
  }
  .fin-card {
    background: var(--surface);
    border-radius: var(--radius-sm);
    padding: 18px 20px;
    border: 1.5px solid var(--border);
    box-shadow: var(--shadow-soft);
  }
  .fin-card-label { font-size: 0.72rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.07em; color: var(--text-soft); margin-bottom: 6px; }
  .fin-card-value { font-family: 'Playfair Display', serif; font-size: 1.5rem; font-weight: 700; }
  .fin-card-value.pos { color: var(--fin-accent); }
  .fin-card-value.neg { color: #c0392b; }
  .fin-card-value.neu { color: var(--text); }
  .fin-tabs { display: flex; gap: 8px; margin-bottom: 20px; }
  .fin-tab {
    padding: 7px 18px;
    border-radius: 50px;
    font-size: 0.82rem;
    font-weight: 600;
    cursor: pointer;
    border: 1.5px solid var(--border);
    background: var(--surface);
    color: var(--text-soft);
    transition: all 0.18s;
  }
  .fin-tab.active { background: var(--fin-accent); color: #fff; border-color: var(--fin-accent); }
  .fin-add-row { display: flex; gap: 10px; margin-bottom: 20px; align-items: center; }
  .fin-add-row .add-input { font-size: 0.85rem; }
  .fin-amount { width: 110px; padding: 12px 14px; border: 1.5px solid var(--border); border-radius: var(--radius-sm); font-family: 'DM Sans', sans-serif; font-size: 0.85rem; background: var(--surface); color: var(--text); outline: none; }
  .fin-item {
    background: var(--surface);
    border-radius: var(--radius-sm);
    padding: 12px 18px;
    display: flex;
    align-items: center;
    gap: 14px;
    box-shadow: var(--shadow-soft);
    border: 1.5px solid var(--border);
    margin-bottom: 8px;
    animation: slideIn 0.25s ease;
  }
  .fin-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .fin-dot.rec { background: var(--fin-accent); }
  .fin-dot.exp { background: #c0392b; }
  .fin-item-desc { flex: 1; font-size: 0.88rem; }
  .fin-item-val { font-weight: 600; font-size: 0.9rem; }
  .fin-item-val.rec { color: var(--fin-accent); }
  .fin-item-val.exp { color: #c0392b; }

  /* ── SONHOS ── */
  .dream-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 16px;
  }
  .dream-card {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 22px 20px;
    border: 1.5px solid var(--dream-light);
    box-shadow: var(--shadow-soft);
    animation: slideIn 0.25s ease;
    position: relative;
  }
  .dream-emoji { font-size: 2rem; margin-bottom: 10px; }
  .dream-text { font-size: 0.9rem; line-height: 1.5; color: var(--text); }
  .dream-del {
    position: absolute; top: 12px; right: 12px;
    background: none; border: none; cursor: pointer;
    color: var(--text-soft); font-size: 0.8rem; opacity: 0.4;
    border-radius: 6px; padding: 3px 6px; transition: all 0.15s;
  }
  .dream-del:hover { opacity: 1; background: #fee; color: #c0392b; }
  .dream-add-row { display: flex; gap: 10px; margin-bottom: 24px; }
  .dream-emoji-input { width: 60px; padding: 12px; text-align: center; border: 1.5px solid var(--border); border-radius: var(--radius-sm); font-size: 1.2rem; background: var(--surface); outline: none; }

  /* screen transitions */
  .screen { animation: fadeIn 0.28s ease; }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Responsive */
  @media (max-width: 600px) {
    .main { padding: 24px 16px; }
    .topbar { padding: 12px 16px; }
    .menu-grid { grid-template-columns: 1fr 1fr; }
    .fin-summary { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="topbar-logo">Meu<span>Plano</span></div>
  <div class="topbar-date-nav">
    <button class="date-arrow" onclick="changeDate(-1)">&#8592;</button>
    <span class="date-label" id="dateLbl"></span>
    <button class="date-arrow" onclick="changeDate(1)">&#8594;</button>
  </div>
  <button class="topbar-back hidden" id="backBtn" onclick="goHome()">&#8592; Início</button>
</div>

<div class="main" id="mainArea">
  <!-- Rendered by JS -->
</div>

<script>
// ── STATE ──
let currentArea = null;
let currentDate = new Date();
let data = JSON.parse(localStorage.getItem('meuPlano') || '{}');

function save() { localStorage.setItem('meuPlano', JSON.stringify(data)); }

function dateKey(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function formatDate(d) {
  const days = ['Domingo','Segunda','Terça','Quarta','Quinta','Sexta','Sábado'];
  const months = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
  return `${days[d.getDay()]}, ${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear()}`;
}

function changeDate(dir) {
  currentDate.setDate(currentDate.getDate() + dir);
  document.getElementById('dateLbl').textContent = formatDate(currentDate);
  if (currentArea && currentArea !== 'financeiro' && currentArea !== 'sonhos') {
    renderArea(currentArea);
  }
}

function countTasks(area) {
  const allKeys = Object.keys(data).filter(k => k.startsWith(area + '_'));
  let total = 0;
  allKeys.forEach(k => { if (Array.isArray(data[k])) total += data[k].filter(t => !t.done).length; });
  return total;
}

// ── AREAS CONFIG ──
const areas = [
  { id: 'financeiro', cls: 'fin', icon: '💰', title: 'Área Financeira', desc: 'Receitas, despesas e controle do seu dinheiro' },
  { id: 'trabalho',   cls: 'work', icon: '💼', title: 'Tarefas do Trabalho', desc: 'Projetos, reuniões e entregas profissionais' },
  { id: 'casa',       cls: 'home', icon: '🏠', title: 'Tarefas de Casa', desc: 'Organização, compras e afazeres domésticos' },
  { id: 'pendencias', cls: 'pend', icon: '📋', title: 'Pendências', desc: 'Coisas que precisam de atenção em breve' },
  { id: 'sonhos',     cls: 'dream', icon: '✨', title: 'Sonhos', desc: 'Seus objetivos, metas e desejos de vida' },
];

const accentMap = {
  financeiro: 'var(--fin-accent)',
  trabalho:   'var(--work-accent)',
  casa:       'var(--home-accent)',
  pendencias: 'var(--pend-accent)',
  sonhos:     'var(--dream-accent)',
};
const bgMap = {
  financeiro: 'var(--fin-bg)',
  trabalho:   'var(--work-bg)',
  casa:       'var(--home-bg)',
  pendencias: 'var(--pend-bg)',
  sonhos:     'var(--dream-bg)',
};

// ── HOME ──
function goHome() {
  currentArea = null;
  document.getElementById('backBtn').classList.add('hidden');
  renderHome();
}

function renderHome() {
  const main = document.getElementById('mainArea');
  const today = formatDate(new Date());
  main.innerHTML = `
    <div class="screen">
      <div class="home-title">Olá! 👋</div>
      <div class="home-subtitle">Hoje é ${today}. O que vamos organizar?</div>
      <div class="menu-grid">
        ${areas.map(a => {
          const pending = a.id !== 'sonhos' ? countTasks(a.id) : (data['sonhos_items'] || []).length;
          const badge = a.id === 'sonhos' ? `${pending} sonhos` : `${pending} pendente${pending!==1?'s':''}`;
          return `
          <div class="menu-card ${a.cls}" onclick="openArea('${a.id}')">
            <span class="card-badge">${badge}</span>
            <span class="card-icon">${a.icon}</span>
            <div class="card-title">${a.title}</div>
            <div class="card-desc">${a.desc}</div>
          </div>`;
        }).join('')}
      </div>
    </div>`;
}

// ── OPEN AREA ──
function openArea(id) {
  currentArea = id;
  document.getElementById('backBtn').classList.remove('hidden');
  renderArea(id);
}

function renderArea(id) {
  if (id === 'financeiro') renderFinanceiro();
  else if (id === 'sonhos') renderSonhos();
  else renderTaskArea(id);
}

// ── TASK AREAS (trabalho, casa, pendencias) ──
function renderTaskArea(id) {
  const a = areas.find(x => x.id === id);
  const key = `${id}_${dateKey(currentDate)}`;
  const tasks = data[key] || [];
  const accent = accentMap[id];
  const bg = bgMap[id];

  const main = document.getElementById('mainArea');
  main.innerHTML = `
    <div class="screen">
      <div class="area-header">
        <div class="area-icon-big" style="background:${bg}; border:2px solid ${accent}20;">${a.icon}</div>
        <div>
          <div class="area-title" style="color:${accent}">${a.title}</div>
          <div class="area-subtitle">${formatDate(currentDate)}</div>
        </div>
      </div>
      <div class="add-row">
        <input class="add-input" id="taskInput" placeholder="Nova tarefa…" style="border-color:${accent}40;"
          onkeydown="if(event.key==='Enter') addTask('${id}')">
        <button class="add-btn" style="background:${accent}" onclick="addTask('${id}')">+ Adicionar</button>
      </div>
      <div class="task-list" id="taskList">
        ${tasks.length === 0
          ? `<div class="empty-state"><div class="empty-icon">${a.icon}</div>Nenhuma tarefa para este dia.<br>Adicione algo acima!</div>`
          : tasks.map((t,i) => taskHTML(t, i, id, accent)).join('')
        }
      </div>
    </div>`;
  document.getElementById('taskInput').focus();
}

function taskHTML(t, i, area, accent) {
  return `
  <div class="task-item" id="task_${i}">
    <div class="task-check ${t.done ? 'done' : ''}" style="${t.done ? `background:${accent};border-color:${accent}` : ''}" onclick="toggleTask('${area}',${i})">
      ${t.done ? '✓' : ''}
    </div>
    <div class="task-text ${t.done ? 'done' : ''}">${escHtml(t.text)}</div>
    <span class="task-date-badge">${formatDate(currentDate).split(', ')[1]}</span>
    <button class="task-del" onclick="deleteTask('${area}',${i})">✕</button>
  </div>`;
}

function addTask(area) {
  const inp = document.getElementById('taskInput');
  const text = inp.value.trim();
  if (!text) return;
  const key = `${area}_${dateKey(currentDate)}`;
  if (!data[key]) data[key] = [];
  data[key].push({ text, done: false });
  save(); inp.value = '';
  renderArea(area);
}

function toggleTask(area, i) {
  const key = `${area}_${dateKey(currentDate)}`;
  data[key][i].done = !data[key][i].done;
  save(); renderArea(area);
}

function deleteTask(area, i) {
  const key = `${area}_${dateKey(currentDate)}`;
  data[key].splice(i, 1);
  save(); renderArea(area);
}

// ── FINANCEIRO ──
let finTab = 'receita';

function renderFinanceiro() {
  const key = `financeiro_${dateKey(currentDate)}`;
  const items = data[key] || [];
  const receitas = items.filter(i => i.type === 'receita');
  const despesas = items.filter(i => i.type === 'despesa');
  const totalRec = receitas.reduce((s,i)=>s+i.val,0);
  const totalExp = despesas.reduce((s,i)=>s+i.val,0);
  const saldo = totalRec - totalExp;

  const main = document.getElementById('mainArea');
  main.innerHTML = `
  <div class="screen">
    <div class="area-header">
      <div class="area-icon-big" style="background:var(--fin-bg);border:2px solid var(--fin-accent)20;">💰</div>
      <div>
        <div class="area-title" style="color:var(--fin-accent)">Área Financeira</div>
        <div class="area-subtitle">${formatDate(currentDate)}</div>
      </div>
    </div>
    <div class="fin-summary">
      <div class="fin-card">
        <div class="fin-card-label">Receitas</div>
        <div class="fin-card-value pos">R$ ${totalRec.toFixed(2)}</div>
      </div>
      <div class="fin-card">
        <div class="fin-card-label">Despesas</div>
        <div class="fin-card-value neg">R$ ${totalExp.toFixed(2)}</div>
      </div>
      <div class="fin-card">
        <div class="fin-card-label">Saldo</div>
        <div class="fin-card-value ${saldo>=0?'pos':'neg'}">R$ ${saldo.toFixed(2)}</div>
      </div>
    </div>
    <div class="fin-tabs">
      <div class="fin-tab ${finTab==='receita'?'active':''}" onclick="setFinTab('receita')">+ Receita</div>
      <div class="fin-tab ${finTab==='despesa'?'active':''}" onclick="setFinTab('despesa')">- Despesa</div>
    </div>
    <div class="fin-add-row">
      <input class="add-input" id="finDesc" placeholder="${finTab==='receita'?'Descrição da receita…':'Descrição da despesa…'}"
        onkeydown="if(event.key==='Enter') addFin()">
      <input class="fin-amount" id="finVal" type="number" placeholder="R$ 0,00" step="0.01" min="0"
        onkeydown="if(event.key==='Enter') addFin()">
      <button class="add-btn" style="background:${finTab==='receita'?'var(--fin-accent)':'#c0392b'}" onclick="addFin()">
        ${finTab==='receita'?'+ Entrada':'- Saída'}
      </button>
    </div>
    <div id="finList">
      ${items.length === 0
        ? `<div class="empty-state"><div class="empty-icon">💸</div>Sem registros para este dia.</div>`
        : items.map((it,i) => `
          <div class="fin-item">
            <div class="fin-dot ${it.type}"></div>
            <div class="fin-item-desc">${escHtml(it.desc)}</div>
            <div class="fin-item-val ${it.type}">${it.type==='receita'?'+':'-'} R$ ${it.val.toFixed(2)}</div>
            <button class="task-del" onclick="deleteFin(${i})">✕</button>
          </div>`).join('')
      }
    </div>
  </div>`;
}

function setFinTab(tab) { finTab = tab; renderFinanceiro(); }

function addFin() {
  const desc = document.getElementById('finDesc').value.trim();
  const val = parseFloat(document.getElementById('finVal').value);
  if (!desc || isNaN(val) || val <= 0) return;
  const key = `financeiro_${dateKey(currentDate)}`;
  if (!data[key]) data[key] = [];
  data[key].push({ type: finTab, desc, val });
  save(); renderFinanceiro();
}

function deleteFin(i) {
  const key = `financeiro_${dateKey(currentDate)}`;
  data[key].splice(i, 1);
  save(); renderFinanceiro();
}

// ── SONHOS ──
function renderSonhos() {
  const dreams = data['sonhos_items'] || [];
  const main = document.getElementById('mainArea');
  main.innerHTML = `
  <div class="screen">
    <div class="area-header">
      <div class="area-icon-big" style="background:var(--dream-bg);border:2px solid var(--dream-accent)20;">✨</div>
      <div>
        <div class="area-title" style="color:var(--dream-accent)">Sonhos</div>
        <div class="area-subtitle">Seus objetivos e desejos de vida</div>
      </div>
    </div>
    <div class="dream-add-row">
      <input class="dream-emoji-input" id="dreamEmoji" placeholder="🌟" maxlength="2">
      <input class="add-input" id="dreamText" placeholder="Escreva um sonho, meta ou desejo…"
        onkeydown="if(event.key==='Enter') addDream()">
      <button class="add-btn" style="background:var(--dream-accent)" onclick="addDream()">+ Adicionar</button>
    </div>
    <div class="dream-grid">
      ${dreams.length === 0
        ? `<div class="empty-state" style="grid-column:1/-1"><div class="empty-icon">🌠</div>Nenhum sonho ainda.<br>Adicione o seu primeiro!</div>`
        : dreams.map((d,i) => `
          <div class="dream-card">
            <button class="dream-del" onclick="deleteDream(${i})">✕</button>
            <div class="dream-emoji">${d.emoji || '🌟'}</div>
            <div class="dream-text">${escHtml(d.text)}</div>
          </div>`).join('')
      }
    </div>
  </div>`;
}

function addDream() {
  const text = document.getElementById('dreamText').value.trim();
  const emoji = document.getElementById('dreamEmoji').value.trim() || '🌟';
  if (!text) return;
  if (!data['sonhos_items']) data['sonhos_items'] = [];
  data['sonhos_items'].push({ text, emoji });
  save(); renderSonhos();
}

function deleteDream(i) {
  data['sonhos_items'].splice(i, 1);
  save(); renderSonhos();
}

// ── UTILS ──
function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── INIT ──
document.getElementById('dateLbl').textContent = formatDate(currentDate);
renderHome();
</script>
</body>
</html>
